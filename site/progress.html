<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Personal Trainer - Progress</title>
  <link rel="stylesheet" href="./styles.css?v=1" />
</head>
<body>
  <main class="shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Personal Trainer</p>
        <h1>Progress</h1>
        <p class="lede">Current snapshot versus the last loaded snapshot, summarized without raw payload noise.</p>
      </div>
      <div class="controls">
        <details class="nav-menu">
          <summary class="button secondary">Views</summary>
          <div class="nav-menu-panel">
            <a class="button secondary" href="./index.html">Snapshot viewer</a>
            <a class="button secondary" href="./strength.html">Strength</a>
            <a class="button secondary" href="./speed.html">Speed</a>
            <a class="button secondary" href="./progress.html">Progress</a>
          </div>
        </details>
      </div>
    </header>

    <section class="card">
      <div class="summary-header">
        <div>
          <p class="label">Source</p>
          <h2 id="source-label">Loading…</h2>
        </div>
        <div class="status-banner" id="status-banner">Waiting for data</div>
      </div>
      <div id="progress-grid" class="grid"></div>
    </section>
  </main>
  <script type="module" src="./progress.js?v=1"></script>
</body>
</html>
