<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Personal Trainer</title>
  <link rel="stylesheet" href="./styles.css?v=4" />
</head>
<body>
  <main class="shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Personal Trainer</p>
        <h1>Dashboard</h1>
      </div>
      <div class="header-actions">
        <details class="nav-menu">
          <summary class="button secondary">Views</summary>
          <div class="nav-menu-panel">
            <a class="button secondary" href="./index.html">Dashboard</a>
            <a class="button secondary" href="./strength.html">Strength</a>
            <a class="button secondary" href="./speed.html">Speed</a>
            <a class="button secondary" href="./progress.html">Progress</a>
          </div>
        </details>
        <details class="nav-menu">
          <summary class="button secondary">Actions</summary>
          <div class="nav-menu-panel">
            <label class="button secondary" for="file-input">Load snapshot</label>
            <label class="button secondary" for="live-input">Load live payload</label>
            <button id="load-sample" class="button secondary" type="button">Load sample</button>
            <button id="load-example" class="button secondary" type="button">Load deployed snapshot</button>
            <button id="open-raw" class="button secondary" type="button">Open raw JSON</button>
          </div>
        </details>
      </div>
    </header>

    <section class="card shell-panel">
      <input id="file-input" type="file" accept="application/json" />
      <input id="live-input" type="file" accept="application/json" />

      <div class="rec-card" id="rec-card">
        <div class="rec-header">
          <p class="label">Today's Recommendation</p>
          <span class="rec-badge" id="status-banner">No file loaded</span>
        </div>
        <h2 id="priority" class="rec-priority">Waiting for snapshot</h2>
        <p id="reason" class="rec-reason">Drop in a JSON snapshot file or live payload export to see the current recommendation.</p>
      </div>

      <div id="stat-groups"></div>

      <div id="sections" class="section-stack"></div>
    </section>
  </main>
  <script type="module" src="./app.js?v=4"></script>
</body>
</html>
