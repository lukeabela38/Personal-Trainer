<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Personal Trainer - Strength</title>
  <link rel="stylesheet" href="./styles.css?v=4" />
  <link rel="stylesheet" href="./strength.css?v=3" />
</head>
<body>
  <main class="shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Personal Trainer</p>
        <h1>Strength</h1>
        <p class="lede">All-time PBs and estimated 1RMs from live Hevy history.</p>
      </div>
      <div class="header-actions">
        <details class="nav-menu">
          <summary class="button secondary">Views</summary>
          <div class="nav-menu-panel">
            <a class="button secondary" href="./index.html">Dashboard</a>
            <a class="button secondary" href="./strength.html">Strength</a>
            <a class="button secondary" href="./speed.html">Speed</a>
            <a class="button secondary" href="./progress.html">Progress</a>
          </div>
        </details>
      </div>
    </header>

    <section class="card shell-panel">
      <div class="strength-header">
        <div>
          <p class="label">Source</p>
          <h2 id="source-label">Loading…</h2>
        </div>
        <span class="status-banner" id="status-banner">Waiting for data</span>
      </div>

      <div class="strength-controls" id="strength-controls" hidden>
        <div class="filter-pills" id="filter-pills"></div>
        <div class="sort-controls">
          <button class="sort-btn is-active" data-sort="date" type="button">By date</button>
          <button class="sort-btn" data-sort="weight" type="button">By 1RM</button>
        </div>
      </div>

      <div id="strength-grid" class="strength-grid"></div>
    </section>
  </main>
  <script type="module" src="./strength.js?v=3"></script>
</body>
</html>
