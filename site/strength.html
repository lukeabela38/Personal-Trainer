<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Personal Trainer - Strength</title>
  <link rel="stylesheet" href="./styles.css?v=4" />
  <link rel="stylesheet" href="./strength.css?v=2" />
</head>
<body>
  <main class="shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Personal Trainer</p>
        <h1>Strength</h1>
        <p class="lede">All-time PBs and estimated 1RMs from live Hevy history.</p>
      </div>
      <div class="controls">
        <details class="nav-menu">
          <summary class="button secondary">Views</summary>
          <div class="nav-menu-panel">
            <a class="button secondary" href="./index.html">Dashboard</a>
            <a class="button secondary" href="./strength.html">Strength</a>
            <a class="button secondary" href="./speed.html">Speed</a>
            <a class="button secondary" href="./progress.html">Progress</a>
          </div>
        </details>
      </div>
    </header>
    <section class="card">
      <div class="summary-header">
        <div>
          <p class="label">Source</p>
          <h2 id="source-label">Loading…</h2>
        </div>
        <div class="status-banner" id="status-banner">Waiting for data</div>
      </div>
      <div class="summary-header">
        <div class="muted">Active item follows the viewport center.</div>
        <div class="status-banner" id="slide-status">0 / 0</div>
      </div>
      <div id="strength-carousel" class="carousel"></div>
    </section>
  </main>
  <script type="module" src="./strength.js?v=1"></script>
</body>
</html>
