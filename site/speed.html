<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Personal Trainer - Speed</title>
  <link rel="stylesheet" href="./speed.css?v=1" />
</head>
<body>
  <main class="shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Personal Trainer</p>
        <h1>Speed</h1>
        <p class="lede">Garmin personal bests for running, surfaced from the same snapshot contract.</p>
      </div>
      <div class="controls">
        <a class="button secondary" href="./index.html">Snapshot viewer</a>
        <a class="button secondary" href="./strength.html">Strength</a>
      </div>
    </header>

    <section class="card">
      <div class="summary-header">
        <div>
          <p class="label">Source</p>
          <h2 id="source-label">Loading…</h2>
        </div>
        <div class="status-banner" id="status-banner">Waiting for data</div>
      </div>
      <div class="summary-header">
        <div class="muted">Centered record is active.</div>
        <div class="status-banner" id="slide-status">0 / 0</div>
      </div>
      <div id="speed-carousel" class="carousel"></div>
    </section>
  </main>
  <script type="module" src="./speed.js?v=1"></script>
</body>
</html>
