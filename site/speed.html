<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Personal Trainer - Speed</title>
  <link rel="stylesheet" href="./styles.css?v=6" />
  <link rel="stylesheet" href="./speed.css?v=4" />
</head>
<body>
  <nav class="bottom-nav">
    <a class="bottom-nav-item" href="./index.html"><span class="bottom-nav-icon">&#9679;</span>Home</a>
    <a class="bottom-nav-item" href="./strength.html"><span class="bottom-nav-icon">&#9651;</span>Strength</a>
    <a class="bottom-nav-item is-active" href="./speed.html"><span class="bottom-nav-icon">&#9654;</span>Speed</a>
    <a class="bottom-nav-item" href="./progress.html"><span class="bottom-nav-icon">&#8645;</span>Progress</a>
  </nav>

  <main class="shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Personal Trainer</p>
        <h1>Speed</h1>
        <p class="lede">Personal bests for running, surfaced from Garmin data.</p>
      </div>
      <div class="header-actions">
        <details class="nav-menu">
          <summary class="button secondary">Views</summary>
          <div class="nav-menu-panel">
            <a class="button secondary" href="./index.html">Dashboard</a>
            <a class="button secondary" href="./strength.html">Strength</a>
            <a class="button secondary" href="./speed.html">Speed</a>
            <a class="button secondary" href="./progress.html">Progress</a>
          </div>
        </details>
      </div>
    </header>

    <section class="card shell-panel">
      <div class="speed-header">
        <div>
          <p class="label">Source</p>
          <h2 id="source-label" class="skeleton" style="width:200px;height:16px">Loading…</h2>
        </div>
        <span class="status-banner skeleton" id="status-banner" style="width:80px;height:28px">Waiting</span>
      </div>

      <div id="speed-goals" class="stat-groups" hidden></div>

      <div id="speed-table" class="speed-table">
        <div class="skeleton skeleton-line" style="width:100%;height:48px"></div>
        <div class="skeleton skeleton-line" style="width:100%;height:48px"></div>
      </div>
    </section>
  </main>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    }
  </script>
  <script type="module" src="./speed.js?v=5"></script>
</body>
</html>
