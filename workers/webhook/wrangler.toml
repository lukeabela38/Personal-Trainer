name = "personal-trainer-webhook"
main = "src/index.ts"
compatibility_date = "2025-03-10"

# workers_dev = true gives a *.workers.dev subdomain.
# To switch to a custom domain:
#   1. Set workers_dev = false
#   2. Add route(s) matching terraform/workers.tf cloudflare_worker_route
#   3. Example: route = { pattern = "workers.example.com/webhook/*", zone_id = "<zone>" }
workers_dev = true

# KV namespace: deduplicate Hevy webhook events (24h TTL).
# After `tofu apply`, copy the namespace ID from terraform output `webhook_events_kv_id`.
# Run `wrangler deploy --var WEBHOOK_EVENTS_ID:<id>` or paste the id below for wrangler dev.
[[kv_namespaces]]
binding = "WEBHOOK_EVENTS"
id = "FILL_ME"
