name: Deploy Personal Trainer Site

on:
  workflow_dispatch:
  schedule:
    - cron: "15 4 * * *"
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "scripts/**"
      - "personal_trainer/src/**"
      - "personal_trainer/examples/**"
      - ".env"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install git-crypt
        run: sudo apt-get update && sudo apt-get install -y git-crypt
      - name: Unlock git-crypt
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          set -euo pipefail
          key_file="$RUNNER_TEMP/git-crypt.key"
          printf '%s' "$GIT_CRYPT_KEY" | base64 --decode > "$key_file"
          git-crypt unlock "$key_file"
      - name: Audit git-crypt coverage
        run: python3 scripts/audit_git_crypt.py
      - name: Prepare site output
        run: |
          set -euo pipefail
          python3 ./scripts/daily_snapshot_runner.py \
            --snapshot-output dist/data/snapshot.json \
            --site-output dist \
            --require-live-garmin
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
      - name: Post-deploy smoke test
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          base_url="${PAGE_URL%/}/"
          echo "Checking deployed Pages site at ${base_url}"
          page_ok=0
          for attempt in $(seq 1 18); do
            if html="$(curl --silent --show-error --location "${base_url}")" &&
              printf '%s' "$html" | grep -q "Dashboard"; then
              page_ok=1
              break
            fi
            sleep 10
          done
          if [ "$page_ok" -ne 1 ]; then
            echo "Pages dashboard never became available" >&2
            exit 1
          fi
          curl --fail --silent --show-error --location "${base_url}favicon.png" >/dev/null
