name: Deploy Personal Trainer Site

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "personal_trainer/examples/**"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Prepare site output
        run: >
          python3 ./scripts/daily_snapshot_runner.py
          --sources-file personal_trainer/examples/snapshot-ready.json
          --snapshot-output dist/data/snapshot.json
          --site-output dist
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
      - name: Post-deploy smoke test
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          base_url="${PAGE_URL%/}/"
          echo "Checking deployed Pages site at ${base_url}"
          curl --fail --silent --show-error --retry 6 --retry-delay 5 --retry-all-errors "${base_url}" | grep -q "Dashboard"
          curl --fail --silent --show-error --retry 6 --retry-delay 5 --retry-all-errors "${base_url}favicon.svg" | grep -q "<svg"
