name: terraform

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

permissions:
  contents: read

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}
  TF_STATE_ENDPOINT: ${{ vars.TF_STATE_ENDPOINT }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  TF_VAR_alert_email: ${{ vars.ALERT_EMAIL }}

jobs:
  plan:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Format check
        run: ../scripts/run_tofu.sh fmt -check -recursive

      - name: Init
        run: ../scripts/run_tofu.sh init

      - name: Validate
        run: ../scripts/run_tofu.sh validate

      - name: Plan
        run: ../scripts/run_tofu.sh plan -input=false -lock=false -no-color -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/tfplan
          if-no-files-found: error

      - name: Security scan (Trivy)
        run: docker run --rm -v "$PWD:/src" -w /src aquasec/trivy:latest config .

  apply:
    needs:
      - plan
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: terraform-apply

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download plan artifact
        uses: actions/download-artifact@v8
        with:
          name: terraform-plan
          path: terraform

      - name: Init
        run: ../scripts/run_tofu.sh init

      - name: Apply
        run: ../scripts/run_tofu.sh apply -input=false -lock=false -no-color tfplan
