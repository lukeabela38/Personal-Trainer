name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testing-guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check testing guardrails
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          base_sha="$PUSH_BEFORE_SHA"
          if [ -n "$BASE_SHA" ]; then
            base_sha="$BASE_SHA"
          fi
          if [ -z "$base_sha" ] || [ "$base_sha" = "0000000000000000000000000000000000000000" ]; then
            base_sha="origin/main"
          fi
          python3 scripts/testing_guardrails.py --base "$base_sha" --head "$HEAD_SHA"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python3 -m pip install ruff==0.15.21
      - name: Ruff auto-fix
        working-directory: personal_trainer
        run: |
          set -o pipefail
          echo "### Ruff auto-fix" >> "$GITHUB_STEP_SUMMARY"
          python3 -m ruff check --fix src tests ../scripts ../tests 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          python3 -m ruff format src tests ../scripts ../tests 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Ruff lint check
        working-directory: personal_trainer
        run: |
          set -o pipefail
          status=0
          echo "### Ruff check" >> "$GITHUB_STEP_SUMMARY"
          python3 -m ruff check src tests 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || status=$?
          python3 -m ruff check ../scripts ../tests 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || status=$?
          exit "$status"

  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install git-crypt
        run: sudo apt-get update && sudo apt-get install -y git-crypt
      - name: Unlock git-crypt
        if: github.actor != 'dependabot[bot]'
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          set -euo pipefail
          key_file="$RUNNER_TEMP/git-crypt.key"
          printf '%s' "$GIT_CRYPT_KEY" | base64 --decode > "$key_file"
          git-crypt unlock "$key_file"
      - name: Audit git-crypt coverage
        if: github.actor != 'dependabot[bot]'
        run: python3 scripts/audit_git_crypt.py
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run package unit tests
        working-directory: personal_trainer
        run: PYTHONPATH=src python -m unittest discover -s tests -v
      - name: Run script integration tests
        run: python3 -m unittest discover -s tests -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - name: Run frontend helper tests
        run: node --test tests/frontend/*.test.js

  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
      - name: Install JS tools
        run: npm ci
      - name: Apply JS formatting fixes
        run: npm run format:js
      - name: Apply JS lint fixes
        run: npm run lint:js:fix
      - name: Lint JS
        run: npm run lint:js

  browser-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
      - name: Install JS tools
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run browser smoke tests
        run: npm run test:browser

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7

      - name: Build Docker image
        run: docker build -t personal-trainer:ci .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: personal-trainer:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: docker-image

      - name: Run Trivy IaC scan on Dockerfile
        id: trivy-iac
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: Dockerfile
          format: sarif
          output: trivy-iac-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Check if IaC SARIF exists
        if: always()
        run: test -f trivy-iac-results.sarif && echo "iac_sarif_found=true" >> "$GITHUB_ENV" || echo "iac_sarif_found=false" >> "$GITHUB_ENV"

      - name: Upload IaC results to GitHub Security
        if: env.iac_sarif_found == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-iac-results.sarif
          category: dockerfile

      - name: Scan filesystem for secrets
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          skip-files: .env.example
