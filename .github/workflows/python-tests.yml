name: Python tests

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: python3 -m pip install ruff>=0.11.0
      - name: Ruff format check
        working-directory: personal_trainer
        run: |
          set -o pipefail
          status=0
          echo "### Ruff format" >> "$GITHUB_STEP_SUMMARY"
          python3 -m ruff format --check src tests 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || status=$?
          python3 -m ruff format --check ../scripts ../tests 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || status=$?
          exit "$status"
      - name: Ruff lint check
        working-directory: personal_trainer
        run: |
          set -o pipefail
          status=0
          echo "### Ruff check" >> "$GITHUB_STEP_SUMMARY"
          python3 -m ruff check src tests 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || status=$?
          python3 -m ruff check ../scripts ../tests 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || status=$?
          exit "$status"

  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run package unit tests
        working-directory: personal_trainer
        run: PYTHONPATH=src python -m unittest discover -s tests -v
      - name: Run script integration tests
        run: python3 -m unittest discover -s tests -v

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t personal-trainer:ci .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: personal-trainer:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: docker-image

      - name: Run Trivy IaC scan on Dockerfile
        id: trivy-iac
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: Dockerfile
          format: sarif
          output: trivy-iac-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Check if IaC SARIF exists
        if: always()
        run: test -f trivy-iac-results.sarif && echo "iac_sarif_found=true" >> "$GITHUB_ENV" || echo "iac_sarif_found=false" >> "$GITHUB_ENV"

      - name: Upload IaC results to GitHub Security
        if: env.iac_sarif_found == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-iac-results.sarif
          category: dockerfile

      - name: Scan filesystem for secrets
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          skip-files: .env.example
