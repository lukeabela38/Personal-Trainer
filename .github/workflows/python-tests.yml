name: Python tests

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  unittest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        working-directory: personal_trainer
        run: PYTHONPATH=src python -m unittest discover -s tests
