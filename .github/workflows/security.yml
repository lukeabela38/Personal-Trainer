name: Security

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: security
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7

      - name: Build Docker image
        run: docker build -t personal-trainer:security .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: personal-trainer:security
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: docker-image

      - name: Run Trivy IaC scan on Dockerfile
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: Dockerfile
          format: sarif
          output: trivy-iac-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Check if IaC SARIF exists
        if: always()
        run: test -f trivy-iac-results.sarif && echo "iac_sarif_found=true" >> "$GITHUB_ENV" || echo "iac_sarif_found=false" >> "$GITHUB_ENV"

      - name: Upload IaC results to GitHub Security
        if: env.iac_sarif_found == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-iac-results.sarif
          category: dockerfile

      - name: Run Trivy IaC scan on terraform/
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: terraform/
          format: sarif
          output: trivy-terraform-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Check if Terraform SARIF exists
        if: always()
        run: test -f trivy-terraform-results.sarif && echo "terraform_sarif_found=true" >> "$GITHUB_ENV" || echo "terraform_sarif_found=false" >> "$GITHUB_ENV"

      - name: Upload Terraform IaC results to GitHub Security
        if: env.terraform_sarif_found == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-terraform-results.sarif
          category: terraform

      - name: Scan filesystem for secrets
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          skip-files: .env.example
