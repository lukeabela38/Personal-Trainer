services:
  app:
    build: .
    image: personal-trainer:latest
    container_name: personal-trainer
    env_file: .env
    environment:
      CRONOMETER_SESSION_FILE: /app/.cronometer_session/session.json
      GARMINTOKENS: /app/.garminconnect
      PERSONAL_TRAINER_SPEED_PREDICTIONS_ENABLED: ${PERSONAL_TRAINER_SPEED_PREDICTIONS_ENABLED:-0}
    volumes:
      - ./personal_trainer:/app/personal_trainer:ro
      - ./scripts:/app/scripts:ro
      - ./site:/app/site:ro
      - ./dist:/app/dist
      - ./personal_trainer:/app/personal_trainer:ro
      - ./scripts:/app/scripts:ro
      - ./site:/app/site:ro
      - ./.env:/app/.env:ro
      - ./.cache/garmin:/app/.garminconnect
      - ./.cache/cronometer:/app/.cronometer_session
    command: python3 scripts/daily_snapshot_runner.py

  site:
    build: .
    image: personal-trainer:latest
    container_name: personal-trainer-site
    ports:
      - "4173:4173"
    volumes:
      - ./dist:/app/dist:ro
    working_dir: /app/dist
    command: python3 -m http.server 4173

  generate-history:
    build: .
    image: personal-trainer:latest
    container_name: personal-trainer-gen
    volumes:
      - ./dist:/app/dist
      - ./personal_trainer/examples:/app/personal_trainer/examples
    command: python3 scripts/generate_history.py

  tofu:
    build:
      context: .
      dockerfile: terraform/Dockerfile
    image: personal-trainer-tofu:latest
    container_name: personal-trainer-tofu
    working_dir: /workspace/terraform
    environment:
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
    volumes:
      - ./:/workspace

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: personal-trainer-tunnel
    command: tunnel --url http://host.docker.internal:4173
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  qr:
    build: .
    image: personal-trainer:latest
    container_name: personal-trainer-qr
    profiles:
      - dev
    volumes:
      - ./dist:/app/dist
    entrypoint: ["python3", "scripts/generate_qr.py"]
    command: ["http://localhost:4173", "/app/dist/qr.png"]
